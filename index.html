    <!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Melodex - Music Player</title>
        <link rel="stylesheet" href="style.css">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
        <link rel="shortcut icon" href="img/Favicon.ico" type="image/x-icon">
    </head>

    <body>
        <div class="container">
            <header class="head">
                <div class="lefthead">
                    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                    <div class="logo-text">♪ Melodex</div>
                </div>

                <div class="centerhead">
                    <div class="search-wrapper">
                        <input type="search" placeholder="Search songs..." class="search" id="searchInput"
                            aria-label="Search songs">
                    </div>
                </div>

                <div class="auth-buttons">
                    <button class="btn login-btn">Login</button>
                    <button class="btn signup-btn">Sign Up</button>
                </div>
            </header>

            <div class="content-area">
                <nav class="navbar" id="navbar">
                    <div class="nav-top">
                        <div class="nav-item">Your Library</div>
                        <div class="createnew" id="openAddModal">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M12 5v14M5 12h14" />
                            </svg>
                            Add Song
                        </div>
                    </div>
                    <div class="playlist-list" id="playlistList"></div>
                </nav>

                <main class="main-view">
                    <div class="section-title">All Songs</div>
                    <div class="cardContainer" id="cardContainer"></div>
                </main>
            </div>

            <footer class="player-bar">
                <div class="now-playing">
                    <div class="now-thumb" id="nowThumb"></div>
                    <div class="track-info">
                        <p class="track-name" id="trackName">Select a song</p>
                        <p class="artist-name" id="artistName">—</p>
                    </div>
                </div>

                <div class="player-controls">
                    <div class="control-buttons">
                        <span id="prevBtn" class="nav-control" aria-label="Previous">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                                color="#000000" fill="none" stroke="currentColor" stroke-width="1.5"
                                stroke-linejoin="round">
                                <path
                                    d="M8.06492 12.6258C8.31931 13.8374 9.67295 14.7077 12.3802 16.4481C15.3247 18.3411 16.797 19.2876 17.9895 18.9229C18.3934 18.7994 18.7654 18.5823 19.0777 18.2876C20 17.4178 20 15.6118 20 12C20 8.38816 20 6.58224 19.0777 5.71235C18.7654 5.41773 18.3934 5.20057 17.9895 5.07707C16.797 4.71243 15.3247 5.6589 12.3802 7.55186C9.67295 9.29233 8.31931 10.1626 8.06492 11.3742C7.97836 11.7865 7.97836 12.2135 8.06492 12.6258Z" />
                                <path d="M4 4L4 20" />
                            </svg>
                        </span>
                        <div class="play-btn-wrapper" id="playBtnWrapper" aria-label="Play/Pause">
                            <span class="play-btn" id="masterPlay">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                                    color="#000000" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <circle cx="12" cy="12" r="10" />
                                    <path
                                        d="M15.9453 12.3948C15.7686 13.0215 14.9333 13.4644 13.2629 14.3502C11.648 15.2064 10.8406 15.6346 10.1899 15.4625C9.9209 15.3913 9.6758 15.2562 9.47812 15.0701C9 14.6198 9 13.7465 9 12C9 10.2535 9 9.38018 9.47812 8.92995C9.6758 8.74381 9.9209 8.60868 10.1899 8.53753C10.8406 8.36544 11.648 8.79357 13.2629 9.64983C14.9333 10.5356 15.7686 10.9785 15.9453 11.6052C16.0182 11.8639 16.0182 12.1361 15.9453 12.3948Z" />
                                </svg>
                            </span>
                        </div>
                        <span id="nextBtn" class="nav-control" aria-label="Next">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                                color="#000000" fill="none" stroke="currentColor" stroke-width="1.5"
                                stroke-linejoin="round">
                                <path
                                    d="M15.9351 12.6258C15.6807 13.8374 14.327 14.7077 11.6198 16.4481C8.67528 18.3411 7.20303 19.2876 6.01052 18.9229C5.60662 18.7994 5.23463 18.5823 4.92227 18.2876C4 17.4178 4 15.6118 4 12C4 8.38816 4 6.58224 4.92227 5.71235C5.23463 5.41773 5.60662 5.20057 6.01052 5.07707C7.20304 4.71243 8.67528 5.6589 11.6198 7.55186C14.327 9.29233 15.6807 10.1626 15.9351 11.3742C16.0216 11.7865 16.0216 12.2135 15.9351 12.6258Z" />
                                <path d="M20 5V19" />
                            </svg>
                        </span>
                    </div>
                    <div class="progress-row">
                        <span class="time-label" id="currentTime">0:00</span>
                        <input type="range" class="seek-slider" id="seekBar" min="0" max="100" value="0" aria-label="Seek">
                        <span class="time-label" id="totalTime">0:00</span>
                    </div>
                </div>

                <div class="volume-controls">
                    <span class="volume-icon" id="volIcon" aria-label="Volume">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="#ffffff"
                            fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path
                                d="M14 14.8135V9.18646C14 6.04126 14 4.46866 13.0747 4.0773C12.1494 3.68593 11.0603 4.79793 8.88232 7.02192C7.75439 8.17365 7.11085 8.42869 5.50604 8.42869C4.10257 8.42869 3.40084 8.42869 2.89675 8.77262C1.85035 9.48655 2.00852 10.882 2.00852 12C2.00852 13.118 1.85035 14.5134 2.89675 15.2274C3.40084 15.5713 4.10257 15.5713 5.50604 15.5713C7.11085 15.5713 7.75439 15.8264 8.88232 16.9781C11.0603 19.2021 12.1494 20.3141 13.0747 19.9227C14 19.5313 14 17.9587 14 14.8135Z" />
                            <path d="M17 9C17.6254 9.81968 18 10.8634 18 12C18 13.1366 17.6254 14.1803 17 15" />
                            <path d="M20 7C21.2508 8.36613 22 10.1057 22 12C22 13.8943 21.2508 15.6339 20 17" />
                        </svg>
                    </span>
                    <input type="range" class="volume-slider" id="volume" min="0" max="1" step="0.01" value="1"
                        aria-label="Volume slider">
                </div>

                <audio id="audio-player"></audio>
            </footer>
        </div>

        <div class="modal-overlay" id="modalOverlay">
            <div class="modal">
                <h2>Add a Song</h2>
                <div class="modal-field">
                    <label class="modal-label">Song Name *</label>
                    <input type="text" id="inputName" placeholder="e.g. Blinding Lights">
                </div>
                <div class="modal-field">
                    <label class="modal-label">Artist *</label>
                    <input type="text" id="inputArtist" placeholder="e.g. The Weeknd">
                </div>
                <div class="modal-field">
                    <label class="modal-label">Audio URL (MP3 link) *</label>
                    <input type="url" id="inputSrc" placeholder="https://example.com/song.mp3">
                </div>
                <div class="modal-field">
                    <label class="modal-label">Cover Image URL (optional)</label>
                    <input type="url" id="inputImg" placeholder="https://example.com/cover.jpg">
                </div>
                <div class="modal-buttons">
                    <button class="modal-btn cancel" id="cancelModal">Cancel</button>
                    <button class="modal-btn confirm" id="confirmAdd">Add Song</button>
                </div>
            </div>
        </div>

        <script src="script.js"></script>
    </body>

    </html>
