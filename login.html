<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Melodex - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Animated background elements */
    .bg-decoration {
      position: fixed;
      border-radius: 50%;
      opacity: 0.05;
      z-index: 0;
    }

    .blob1 {
      width: 400px;
      height: 400px;
      background: #1db954;
      top: -100px;
      right: -100px;
      animation: float 20s infinite ease-in-out;
    }

    .blob2 {
      width: 300px;
      height: 300px;
      background: #1ed760;
      bottom: -100px;
      left: -100px;
      animation: float 25s infinite ease-in-out reverse;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(30px, 30px) rotate(180deg); }
    }

    .container {
      background: rgba(20, 20, 35, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(29, 185, 84, 0.2);
      padding: 50px 40px;
      border-radius: 20px;
      width: 100%;
      max-width: 420px;
      color: white;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 100px rgba(29, 185, 84, 0.1);
      z-index: 10;
      animation: slideUp 0.8s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #1db954, #1ed760);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      text-align: center;
      color: #b3b3b3;
      font-size: 14px;
      margin-bottom: 40px;
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 1.5rem;
      font-weight: 700;
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #b3b3b3;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(29, 185, 84, 0.3);
      border-radius: 10px;
      outline: none;
      background: rgba(30, 30, 50, 0.8);
      color: white;
      font-family: inherit;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    input::placeholder {
      color: #717171;
    }

    input:focus {
      border-color: #1db954;
      background: rgba(30, 30, 50, 0.95);
      box-shadow: 0 0 0 3px rgba(29, 185, 84, 0.15);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #1db954, #1ed760);
      color: #0a0a0a;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
      box-shadow: 0 8px 20px rgba(29, 185, 84, 0.3);
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(29, 185, 84, 0.4);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 30px 0;
      gap: 10px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }

    .divider-text {
      color: #717171;
      font-size: 13px;
    }

    .footer {
      text-align: center;
      margin-top: 30px;
    }

    .footer-text {
      color: #b3b3b3;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .footer a {
      color: #1db954;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .footer a:hover {
      color: #1ed760;
      text-decoration: underline;
    }

    .error-message {
      display: none;
      background: rgba(255, 69, 69, 0.1);
      border: 1px solid #ff4545;
      color: #ff8787;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
      animation: slideDown 0.3s ease-out;
    }

    .error-message.show {
      display: block;
    }

    .error-message.success {
      background: rgba(29, 185, 84, 0.1);
      border-color: #1db954;
      color: #1ed760;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .loading {
      display: none;
      text-align: center;
      padding: 20px 0;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(29, 185, 84, 0.3);
      border-top-color: #1db954;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .container {
        padding: 40px 30px;
        width: 90%;
      }

      h2 {
        font-size: 1.3rem;
      }

      input {
        padding: 12px 14px;
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <div class="bg-decoration blob1"></div>
  <div class="bg-decoration blob2"></div>

  <div class="container">
    <div class="logo">♪ Melodex</div>
    <div class="subtitle">Your Music, Your Way</div>
    
    <h2>Welcome Back</h2>

    <div class="error-message" id="errorMessage"></div>

    <div class="input-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
    </div>

    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="login-btn" onclick="login()" id="loginBtn">Login</button>

    <div class="loading" id="loadingSpinner">
      <div class="spinner"></div>
    </div>

    <div class="divider">
      <span class="divider-text">New to Melodex?</span>
    </div>

    <div class="footer">
      <div class="footer-text">Create an account to get started</div>
      <a href="register.html">Sign Up Here</a>
    </div>
  </div>

  <script>
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const errorMessage = document.getElementById("errorMessage");
    const loadingSpinner = document.getElementById("loadingSpinner");

    // Enter key support
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && (document.activeElement === emailInput || document.activeElement === passwordInput)) {
        login();
      }
    });

    function showError(message, isSuccess = false) {
      errorMessage.textContent = message;
      errorMessage.classList.add('show');
      if (isSuccess) {
        errorMessage.classList.add('success');
      } else {
        errorMessage.classList.remove('success');
      }
      if (!isSuccess) {
        setTimeout(() => {
          errorMessage.classList.remove('show');
        }, 5000);
      }
    }

    function login() {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      // Validation
      if (!email || !password) {
        showError('Please enter both email and password');
        return;
      }

      if (!email.includes('@')) {
        showError('Please enter a valid email address');
        return;
      }

      if (password.length < 6) {
        showError('Password must be at least 6 characters');
        return;
      }

      // Show loading state
      loginBtn.disabled = true;
      loadingSpinner.style.display = 'block';
      errorMessage.classList.remove('show');

      fetch("http://localhost:3000/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
      })
      .then(res => res.json())
      .then(data => {
        loginBtn.disabled = false;
        loadingSpinner.style.display = 'none';

        if (data.token) {
          // ✅ Store BOTH token AND email
          localStorage.setItem("token", data.token);
          localStorage.setItem("userEmail", email);
          
          // Success message
          showError('Login successful! Redirecting...', true);
          
          setTimeout(() => {
            window.location.href = "index.html";
          }, 1000);
        } else {
          showError(data.message || 'Login failed');
        }
      })
      .catch(err => {
        loginBtn.disabled = false;
        loadingSpinner.style.display = 'none';
        console.error("Login error:", err);
        showError('Connection error. Make sure the server is running on http://localhost:3000');
      });
    }
  </script>

</body>
</html>
